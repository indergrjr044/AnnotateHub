name: annotatehub
description: A collaborative document annotation system client built in Flutter (AnnotateHub).
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  http_parser: ^4.0.0
  socket_io_client: ^2.0.3
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  file_picker: ^6.1.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
